<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAREN — Mode Minimaliste</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream:#F5F2ED; --black:#111110; --mid:#6B6760; --line:#DDD9D2; --accent:#C4A882; }
  html { scroll-behavior: smooth; }
  body { background:var(--cream); color:var(--black); font-family:'DM Sans',sans-serif; font-weight:300; font-size:14px; line-height:1.6; cursor:none; overflow-x: hidden; }

  /* CURSOR */
  .cursor { width:8px; height:8px; background:var(--black); border-radius:50%; position:fixed; top:0; left:0; pointer-events:none; z-index:9999; transition: opacity 0.3s; }
  .cursor-ring { width:32px; height:32px; border:1px solid var(--black); border-radius:50%; position:fixed; top:0; left:0; pointer-events:none; z-index:9998; transition: transform 0.15s ease-out, width 0.3s, height 0.3s, border-color 0.2s, opacity 0.3s; transform: translate(-50%, -50%); }
  body:has(a:hover) .cursor-ring, body:has(button:hover) .cursor-ring { width:48px; height:48px; border-color:var(--accent); }

  /* HEADER */
  header { position:fixed; top:0; left:0; right:0; z-index:100; background:var(--cream); border-bottom:1px solid var(--line); display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:0 40px; height:64px; }
  .nav-left { display:flex; gap:32px; }
  .nav-right { display:flex; gap:24px; align-items:center; justify-content:flex-end; }
  nav a { text-decoration:none; color:var(--mid); font-size:12px; letter-spacing:0.12em; text-transform:uppercase; transition:color 0.2s; cursor:none; }
  nav a:hover { color:var(--black); }
  .logo { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:300; letter-spacing:0.3em; text-align:center; text-decoration:none; color:var(--black); cursor:none; }
  .cart-btn { background:none; border:none; font-family:'DM Sans',sans-serif; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--black); cursor:none; display:flex; align-items:center; gap:8px; padding:6px 0; }
  .cart-count { background:var(--black); color:var(--cream); border-radius:50%; width:18px; height:18px; font-size:10px; display:flex; align-items:center; justify-content:center; transition:transform 0.2s; }

  /* HERO */
  .hero { margin-top:64px; height:calc(100vh - 64px); display:grid; grid-template-columns:1fr 1fr; overflow:hidden; }
  .hero-text { display:flex; flex-direction:column; justify-content:center; padding:80px 60px; animation:fadeUp 1s ease both; }
  .hero-title { font-family:'Cormorant Garamond',serif; font-size:clamp(52px,6vw,86px); font-weight:300; line-height:1.05; margin-bottom:32px; }
  .btn-primary { display:inline-flex; align-items:center; gap:12px; background:var(--black); color:var(--cream); padding:14px 32px; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; text-decoration:none; border:none; cursor:none; transition: background 0.3s; }
  .btn-primary:hover { background:var(--mid); }

  /* PRODUCTS */
  section { padding:80px 40px; }
  .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:30px; }
  .product-card { background:transparent; position:relative; animation:fadeUp 0.6s ease both; }
  .product-img { aspect-ratio:3/4; background:#E4DED6; position:relative; overflow:hidden; transition:transform 0.6s ease; display:flex; align-items:center; justify-content:center; }
  .product-img img { width:100%; height:100%; object-fit:cover; }
  .product-actions { position:absolute; bottom:0; left:0; right:0; background:var(--black); color:var(--cream); padding:15px; font-size:11px; text-transform:uppercase; text-align:center; transform:translateY(100%); transition:transform 0.3s; border:none; cursor:none; }
  .product-card:hover .product-actions { transform:translateY(0); }

  /* DRAWER (Cart & Admin) */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:200; opacity:0; pointer-events:none; transition:opacity 0.4s; backdrop-filter:blur(4px); }
  .overlay.open { opacity:1; pointer-events:all; }
  .drawer { position:fixed; top:0; right:0; width:400px; height:100vh; background:var(--cream); z-index:201; transform:translateX(100%); transition:transform 0.5s cubic-bezier(0.16,1,0.3,1); display:flex; flex-direction:column; }
  .drawer.open { transform:translateX(0); }
  .drawer-header { padding:30px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }

  /* NOTIF */
  .notif { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--black); color:var(--cream); padding:12px 24px; font-size:12px; opacity:0; transition:0.3s; z-index:1000; }
  .notif.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ADMIN FAB */
  .admin-fab { position:fixed; bottom:30px; right:30px; background:var(--black); color:white; border:none; width:50px; height:50px; border-radius:50%; cursor:none; z-index:150; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  
  @media(max-width:768px){ .hero{grid-template-columns:1fr} .drawer{width:100%} }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<header>
  <nav class="nav-left">
    <a href="#catalogue">Catalogue</a>
    <a href="#nouveautes">Nouveautés</a>
  </nav>
  <a href="#" class="logo">MAREN</a>
  <div class="nav-right">
    <button class="cart-btn" id="cartBtn">Panier <span class="cart-count" id="cartCount">0</span></button>
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <p
